##############################################################################
# Apartment ERP — Production Stack
#
# Starts the Next.js app + PostgreSQL in a self-contained environment.
# Redis is optional; the app falls back to in-memory storage without it.
#
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Copy and fill in environment: cp .env.example .env
#   2. Ensure DATABASE_URL in .env matches POSTGRES_PASSWORD below
#   3. Backups run via the Next.js instrumentation hook (no separate container)
##############################################################################
version: '3.9'

services:
  postgres:
    # Custom build with awscli for WAL archiving to S3
    # Build: docker build -f deploy/postgres/Dockerfile -t apartment-erp-postgres:latest .
    image: apartment-erp-postgres:latest
    build:
      context: ./postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-test}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_REGION:-ap-southeast-1}
      WAL_S3_BUCKET:     ${BACKUP_S3_BUCKET:-apt-backups}
      WAL_S3_PREFIX:     pg/wal
    # WAL archiving: PITR with RPO < 5 min via S3
    # Uses /usr/local/bin/wal-g-archive.sh helper (awscli + logging)
    command: >
      postgres
      -c wal_level=replica
      -c archive_mode=on
      -c "archive_command=/usr/local/bin/wal-g-archive.sh %p %f"
      -c max_wal_senders=10
      -c wal_keep_size=512MB
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-test}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      SENTRY_DSN: ${SENTRY_DSN:-}
      CRON_SECRET: ${CRON_SECRET}
      REDIS_URL: ${REDIS_URL:-}
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_ACCESS_TOKEN: ${LINE_ACCESS_TOKEN:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_USER_ID: ${LINE_USER_ID:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      SLACK_ALERT_WEBHOOK_URL: ${SLACK_ALERT_WEBHOOK_URL:-}
      SLACK_ALERT_CHANNEL: ${SLACK_ALERT_CHANNEL:-#alerts}
      PAGERDUTY_ROUTING_KEY: ${PAGERDUTY_ROUTING_KEY:-}
      PAGERDUTY_EVENT_URL: ${PAGERDUTY_EVENT_URL:-https://events.pagerduty.com/v2/enqueue}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - app_backups:/app/data/backups

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARED_TOKEN}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - apartment_net

networks:
  apartment_net:
    name: ${DOCKER_NETWORK:-apartment_net}
    driver: bridge

volumes:
  pgdata:
    driver: local
  app_backups:
    driver: local
