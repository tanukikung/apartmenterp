# ╔══════════════════════════════════════════════════════════════════╗
# ║          Apartment ERP — Coolify Deployment                      ║
# ║                                                                  ║
# ║  ใช้ไฟล์นี้เมื่อ deploy ผ่าน Coolify เท่านั้น                    ║
# ║  ตั้งค่า env vars ทั้งหมดใน Coolify UI (ไม่ต้องใช้ .env file)   ║
# ║                                                                  ║
# ║  Services: PostgreSQL · Redis · ERP App                          ║
# ╚══════════════════════════════════════════════════════════════════╝

version: '3.8'

services:

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: apartment_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apartment_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ERP Application ───────────────────────────────────────────────
  app:
    build:
      context: ./apps/erp
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production

      # ── Database ──
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/apartment_erp

      # ── Redis ──
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

      # ── Auth (ตั้งค่าใน Coolify UI) ──
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # ใส่ domain จริง เช่น https://erp.yourdomain.com
      NEXTAUTH_URL: ${APP_BASE_URL}
      APP_BASE_URL: ${APP_BASE_URL}

      # ── Cron ──
      CRON_SECRET: ${CRON_SECRET}

      # ── LINE Integration (ไม่บังคับ) ──
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_ACCESS_TOKEN: ${LINE_ACCESS_TOKEN:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_USER_ID: ${LINE_USER_ID:-}

    # Coolify จัดการ port และ domain ผ่าน Traefik proxy อัตโนมัติ
    expose:
      - "3000"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
