##############################################################################
# Apartment ERP — Local Development Stack
#
# Starts PostgreSQL + Redis only (app runs on your host machine).
# Use this when you want the app running locally via `npm run dev`.
#
#   docker compose -f docker-compose.dev.yml up -d
#   npm run setup
#   npm run dev
#
# NOTE: Edit .env first — DATABASE_URL must match the POSTGRES_DB and
#       POSTGRES_PASSWORD below.
##############################################################################
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-test}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-test}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: {}
