# Docker Compose for isolated test database
# Usage: docker compose -f docker-compose.test.yml up -d --wait
# Then: npx vitest run --env-file .env.test --testPathPattern 'integration'
# After:  docker compose -f docker-compose.test.yml down

version: '3.8'

services:
  test-db:
    image: postgres:16-alpine
    container_name: apartment-erp-test-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      # Initialize schema if needed (prisma migrate runs automatically)
      - ./tests/setup-sql.sql:/docker-entrypoint-initdb.d/01-setup.sql:ro
    networks:
      - test-network

networks:
  test-network:
    driver: bridge