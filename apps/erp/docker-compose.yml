##############################################################################
# Apartment ERP — Docker Compose
#
# Full stack (PostgreSQL + Redis + OnlyOffice + App):
#   cp .env.example .env.production   # fill in secrets
#   docker compose up -d
#
# Lighter stack (skip OnlyOffice):
#   docker compose up -d postgres redis migrate app
#
# OnlyOffice networking explanation:
#   Browser  ──► OnlyOffice:  use ONLYOFFICE_DOCUMENT_SERVER_URL  (public URL, e.g. http://localhost:8080)
#   OnlyOffice ──► App:       use ONLYOFFICE_CALLBACK_BASE_URL    (internal docker URL, http://app:3000)
#   These MUST be different when running in Docker — localhost inside a container
#   is NOT the host machine!
#
# First-boot note: OnlyOffice takes ~60–120 s to initialize on first start.
# The app starts independently and shows an error in the editor until OnlyOffice is ready.
##############################################################################
version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-apartment_erp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-apartment_erp}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Redis (optional — app degrades gracefully without it) ───────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── ONLYOFFICE Document Server ──────────────────────────────────────────
  # Community Edition — free, self-hosted.
  # RAM: minimum 2 GB recommended, 4 GB for comfortable editing.
  # First boot downloads fonts and sets up internal services (~60–120 s).
  # Disable this service if you don't need in-browser Excel/Word editing:
  #   docker compose up -d postgres redis migrate app
  onlyoffice:
    image: onlyoffice/documentserver:latest
    restart: unless-stopped
    environment:
      # JWT must match ONLYOFFICE_JWT_SECRET in the app service below
      JWT_ENABLED:  "true"
      JWT_SECRET:   ${ONLYOFFICE_JWT_SECRET:-changeme-set-a-real-secret}
      JWT_HEADER:   Authorization
      JWT_IN_BODY:  "true"
    ports:
      - "${ONLYOFFICE_PORT:-8080}:80"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_db:/var/lib/postgresql
      - onlyoffice_rabbitmq:/var/lib/rabbitmq
      - onlyoffice_redis:/var/lib/redis
    healthcheck:
      # /healthcheck returns 200 when OnlyOffice is fully ready
      test: ["CMD-SHELL", "curl -sf http://localhost/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ─── One-shot migration + seed service ───────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "
        echo '⏳ Running Prisma migrations…' &&
        npx prisma migrate deploy &&
        echo '✅ Migrations applied.' &&
        if [ \"$$SEED_DB\" = 'true' ]; then
          echo '🌱 Seeding database…' &&
          npx prisma db seed &&
          echo '✅ Seed complete.';
        fi
      "
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/apartment_erp}
      SEED_DB:      ${SEED_DB:-false}
    env_file:
      - path: .env.production
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Next.js application ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:                      production
      DATABASE_URL:                  ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/apartment_erp}
      NEXTAUTH_SECRET:               ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL:                  ${NEXTAUTH_URL:-http://localhost:3000}
      APP_BASE_URL:                  ${APP_BASE_URL:-http://localhost:3000}
      LINE_CHANNEL_ID:               ${LINE_CHANNEL_ID:-}
      LINE_CHANNEL_SECRET:           ${LINE_CHANNEL_SECRET:-}
      LINE_ACCESS_TOKEN:             ${LINE_ACCESS_TOKEN:-}
      LINE_CHANNEL_ACCESS_TOKEN:     ${LINE_CHANNEL_ACCESS_TOKEN:-}
      CRON_SECRET:                   ${CRON_SECRET:-}
      CRON_ENABLED:                  ${CRON_ENABLED:-true}
      REDIS_URL:                     ${REDIS_URL:-redis://redis:6379}
      LOG_DIR:                       /logs
      # ── OnlyOffice ──
      # Public URL (what the browser loads OnlyOffice JS from):
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:-http://localhost:8080}
      # JWT secret — must match JWT_SECRET in the onlyoffice service above:
      ONLYOFFICE_JWT_SECRET:          ${ONLYOFFICE_JWT_SECRET:-changeme-set-a-real-secret}
      # Internal URL (what OnlyOffice calls back to — use docker service name):
      ONLYOFFICE_CALLBACK_BASE_URL:   ${ONLYOFFICE_CALLBACK_BASE_URL:-http://app:3000}
    env_file:
      - path: .env.production
        required: false
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      # Note: we do NOT wait for onlyoffice here — it takes too long to start.
      # The app handles ONLYOFFICE being unavailable gracefully.
    volumes:
      - logs:/logs
      - uploads:/app/.data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:            {}
  logs:              {}
  uploads:           {}
  onlyoffice_data:   {}
  onlyoffice_logs:   {}
  onlyoffice_db:     {}
  onlyoffice_rabbitmq: {}
  onlyoffice_redis:  {}
