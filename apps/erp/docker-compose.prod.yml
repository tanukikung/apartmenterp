version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apartment_erp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── ONLYOFFICE Document Server ──────────────────────────────────────────────
  # Community Edition — free, self-hosted.
  # RAM: minimum 2 GB recommended, 4 GB for comfortable editing.
  # First boot downloads fonts and sets up internal services (~60–120 s).
  # To disable: set ONLYOFFICE_ENABLED=false in .env.production
  onlyoffice:
    image: onlyoffice/documentserver:latest
    restart: unless-stopped
    environment:
      JWT_ENABLED:  "true"
      JWT_SECRET:   ${ONLYOFFICE_JWT_SECRET:-changeme-set-a-real-secret}
      JWT_HEADER:   Authorization
      JWT_IN_BODY:  "true"
    ports:
      - "${ONLYOFFICE_PORT:-8080}:80"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_db:/var/lib/postgresql
      - onlyoffice_rabbitmq:/var/lib/rabbitmq
      - onlyoffice_redis:/var/lib/redis
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  erp-app:
    build: .
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      LOG_DIR: /logs
      # ── OnlyOffice ──
      # Public URL that the browser uses to load ONLYOFFICE JS:
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:-http://localhost:8080}
      # Enable/disable ONLYOFFICE integration (set to false to disable editor):
      ONLYOFFICE_ENABLED:            ${ONLYOFFICE_ENABLED:-true}
      # JWT secret — must match JWT_SECRET in the onlyoffice service above:
      ONLYOFFICE_JWT_SECRET:          ${ONLYOFFICE_JWT_SECRET:-changeme-set-a-real-secret}
      # Internal URL ONLYOFFICE uses to call back into the app (Docker service name):
      ONLYOFFICE_CALLBACK_BASE_URL:    ${ONLYOFFICE_CALLBACK_BASE_URL:-http://erp-app:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Note: erp-app does NOT wait for onlyoffice to be healthy.
      # The app handles ONLYOFFICE being unavailable gracefully.
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build: .
    command: ["node", "dist/worker.js"]
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    depends_on:
      erp-app:
        condition: service_healthy
    restart: unless-stopped

  backup-scheduler:
    build: .
    command: ["node", "dist/backup-scheduler.js"]
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      BACKUP_DIR: /backups
    volumes:
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: {}
  redisdata: {}
  logs: {}
  backups: {}
  onlyoffice_data: {}
  onlyoffice_logs: {}
  onlyoffice_db: {}
  onlyoffice_rabbitmq: {}
  onlyoffice_redis: {}
