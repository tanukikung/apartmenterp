version: 2

updates:
  # ── npm dependencies for the ERP app ───────────────────────────────────────
  - package-ecosystem: npm
    directory: /apps/erp
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Bangkok
    open-pull-requests-limit: 10
    # Keep major version bumps separate so they are easy to review.
    groups:
      # Batch all non-major patch/minor updates together.
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: 'chore(deps)'
    reviewers:
      - ${{ github.repository_owner }}
    ignore:
      # Prisma major bumps need careful schema review — raise manually.
      - dependency-name: 'prisma'
        update-types: ['version-update:semver-major']
      - dependency-name: '@prisma/client'
        update-types: ['version-update:semver-major']
      # Next.js major bumps need app-wide testing.
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'chore(ci)'
    reviewers:
      - ${{ github.repository_owner }}

  # ── Docker base images ──────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /apps/erp
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Bangkok
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: 'chore(docker)'
    reviewers:
      - ${{ github.repository_owner }}
