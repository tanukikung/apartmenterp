name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

# Never cancel an in-flight deploy — let it finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy job — only runs on pushes to main
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'

    # Requires a "production" environment configured in GitHub → Settings →
    # Environments.  Add a required reviewer there to gate every deploy.
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker setup ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Image metadata (tags + labels) ──────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/apartment-erp
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build & push ─────────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SSH deploy to VPS ───────────────────────────────────────────────────
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail

            cd /opt/apartment-erp

            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling new image..."
            docker compose pull app

            echo "Restarting app container..."
            docker compose up -d --no-deps app

            echo "Running pending migrations..."
            docker compose exec -T app npx prisma migrate deploy

            echo "Cleaning up unused Docker resources..."
            docker system prune -f --volumes=false

            echo "Deploy complete: $(date)"

      # ── Health check ─────────────────────────────────────────────────────────
      - name: Wait for application start
        run: |
          echo "Waiting 30 s for the app to come up..."
          sleep 30

      - name: Health check
        run: |
          echo "Hitting ${{ secrets.APP_URL }}/api/health ..."
          curl --fail --silent --show-error --max-time 15 \
               "${{ secrets.APP_URL }}/api/health" \
            && echo "Health check passed." \
            || (echo "Health check FAILED — rolling back is recommended." && exit 1)

      # ── Step summary ─────────────────────────────────────────────────────────
      - name: Write deploy summary
        if: always()
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ github.event.inputs.reason || 'push to main' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

      # ── Failure notification ─────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error title=Deploy failed::Deploy for commit ${{ github.sha }} failed."  \
               "Check the workflow run at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
