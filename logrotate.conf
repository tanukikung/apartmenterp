# =============================================================================
# Logrotate configuration for Apartment ERP production logs
# =============================================================================
# Install on host:
#   1. Save this file to /etc/logrotate.d/apartment-erp
#   2. Adjust paths below to match your deployment
#   3. Test: logrotate -f /etc/logrotate.d/apartment-erp
#
# For Docker/rsyslog setups, container logs are typically captured via
# json-file driver and managed by Docker's own log rotation. In that case,
# configure log-max-size and log-max-rotate in daemon.json instead:
#   { "log-driver": "json-file", "log-opts": { "max-size": "50m", "max-file": "5" } }
# =============================================================================

# Path to Next.js application logs (adjust to match your deployment)
# If using Docker, these paths are relative to the container filesystem.
# The actual log files are written to stdout/stderr and captured by the
# container runtime (Docker json-file driver). Configure rotation there
# via daemon.json or use the below for host-level log files.
# Examples:
#   /var/log/apartment-erp/*.log
#   /app/*.log
/home/app/logs/*.log {
    # Rotate daily
    daily

    # Keep 14 days of logs
    rotate 14

    # Compress rotated logs with gzip
    compress
    compresscmd /usr/bin/gzip
    uncompresscmd /usr/bin/gunzip
    compressext .gz

    # Don't fail if logs are missing
    missingok

    # Don't rotate if empty
    notifempty

    # Delay compression until next rotation cycle
    delaycompress

    # Create new log file with rw------- permissions
    create 0600 root root

    # Run postrotate script to notify Next.js to reopen log files
    # (Next.js does not support graceful log rotation, but signaling
    #  the process helps with monitoring/alerting integrations)
    postrotate
        # Send SIGHUP to all Next.js processes (adjust container/pid name as needed)
        # kill -HUP $(cat /var/run/apartment-erp.pid 2>/dev/null) 2>/dev/null || true
        echo "$(date) logrotate ran" >> /var/log/apartment-erp/.logrotate-status
    endscript
}

# Also rotate Docker container logs if not using json-file driver max-size
# /var/lib/docker/containers/*/*.log {
#     daily
#     rotate 7
#     compress
#     missingok
#     notifempty
#     copytruncate
# }
