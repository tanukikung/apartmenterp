services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-apartment_erp}
      TZ: ${TZ:-Asia/Bangkok}
    volumes:
      - customer_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-apartment_erp}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - customer_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      TZ: ${TZ:-Asia/Bangkok}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-apartment_erp}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${APP_BASE_URL:-http://localhost:3000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CRON_SECRET: ${CRON_SECRET}
      INVOICE_ACCESS_SECRET: ${INVOICE_ACCESS_SECRET}
      FILE_ACCESS_SECRET: ${FILE_ACCESS_SECRET}
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD}
      SEED_STAFF_PASSWORD: ${SEED_STAFF_PASSWORD}
      CRON_ENABLED: ${CRON_ENABLED:-true}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/data/uploads}
      BACKUP_DIR: ${BACKUP_DIR:-/app/data/backups}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_ACCESS_TOKEN: ${LINE_ACCESS_TOKEN:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_USER_ID: ${LINE_USER_ID:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
    volumes:
      - customer_appdata:/app/data
    healthcheck:
      test: ["CMD", "node", "./scripts/customer-healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  customer_pgdata:
  customer_appdata:
  customer_redisdata:
