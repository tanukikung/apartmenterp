version: '3.8'

# ╔══════════════════════════════════════════════════════════════╗
# ║           Apartment ERP — Full Stack Docker Compose          ║
# ║  Services: PostgreSQL · Redis · OnlyOffice · ERP App         ║
# ║  Usage: copy .env.example → .env, then: docker compose up -d ║
# ╚══════════════════════════════════════════════════════════════╝

services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: apartment_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Please set DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apartment_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Please set REDIS_PASSWORD in .env}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  # ── OnlyOffice Document Server ────────────────────────────────
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: erp_onlyoffice
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:?Please set ONLYOFFICE_JWT_SECRET in .env}
      JWT_HEADER: Authorization
      JWT_IN_BODY: "true"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_cache:/var/lib/onlyoffice
      - onlyoffice_db:/var/lib/postgresql
    ports:
      - "${ONLYOFFICE_PORT:-8080}:80"
    networks:
      - erp_network

  # ── ERP Application ───────────────────────────────────────────
  app:
    build:
      context: ./apps/erp
      dockerfile: Dockerfile
    image: apartment-erp:latest
    container_name: erp_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/apartment_erp
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Please set NEXTAUTH_SECRET in .env}
      NEXTAUTH_URL: http://${APP_HOST:-localhost}:${APP_PORT:-3001}
      APP_BASE_URL: http://${APP_HOST:-localhost}:${APP_PORT:-3001}
      CRON_SECRET: ${CRON_SECRET:-default-cron-secret}
      # OnlyOffice: browser reaches via APP_HOST:ONLYOFFICE_PORT
      # OnlyOffice calls back to app via internal Docker network
      ONLYOFFICE_DOCUMENT_SERVER_URL: http://${APP_HOST:-localhost}:${ONLYOFFICE_PORT:-8080}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
      ONLYOFFICE_CALLBACK_BASE_URL: http://app:3000
      ONLYOFFICE_ENABLED: "true"
      # LINE Integration (optional — leave empty to disable)
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_ACCESS_TOKEN: ${LINE_ACCESS_TOKEN:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_USER_ID: ${LINE_USER_ID:-}
    ports:
      - "${APP_PORT:-3001}:3000"
    networks:
      - erp_network

volumes:
  postgres_data:   { name: erp_postgres_data }
  redis_data:      { name: erp_redis_data }
  onlyoffice_data: { name: erp_onlyoffice_data }
  onlyoffice_logs: { name: erp_onlyoffice_logs }
  onlyoffice_cache:{ name: erp_onlyoffice_cache }
  onlyoffice_db:   { name: erp_onlyoffice_db }

networks:
  erp_network:
    name: erp_network
