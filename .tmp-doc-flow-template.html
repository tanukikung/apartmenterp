<!doctype html><html><head><meta charset="utf-8"><style>body{font-family:Arial,'Noto Sans Thai',sans-serif;padding:32px;color:#222}.card{border:1px solid #ddd;border-radius:12px;padding:24px}h1{margin:0 0 12px;font-size:24px}.grid{display:grid;grid-template-columns:160px 1fr;gap:8px 16px}.label{color:#666}.value{font-weight:600}</style></head><body><div class="card"><h1>Flow Test Document</h1><div class="grid"><div class="label">Apartment</div><div class="value">{{apartment.name}}</div><div class="label">Room</div><div class="value">{{room.number}}</div><div class="label">Tenant</div><div class="value">{{tenant.fullName}}</div><div class="label">Generated</div><div class="value">{{system.generatedAt}}</div><div class="label">Contract</div><div class="value">{{contract.number}}</div><div class="label">Billing Month</div><div class="value">{{computed.billingMonthLabel}}</div><div class="label">Total</div><div class="value">{{computed.totalAmountFormatted}}</div></div></div></body></html>
